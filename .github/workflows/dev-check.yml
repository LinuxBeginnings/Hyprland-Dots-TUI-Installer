# ============================================================================
# dev-check.yml — Quality gate and build check for dev branch.
#
# Trigger:  Manual workflow dispatch (can be run from GitHub Actions tab)
# Jobs:
#   1. test    — Run the full quality-gate pipeline (typecheck / lint / tests)
#   2. build   — Compile the standalone binary with PyInstaller (needs test)
#
# Note: This workflow does NOT create a release; it only validates that
#       the build pipeline works and artifacts can be inspected.
# ============================================================================

name: Dev Check

on:
  workflow_dispatch:

concurrency:
  group: dev-check-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --------------------------------------------------------------------------
  # Job 1 — Quality gate (mirrors scripts/test_pipeline.sh)
  # --------------------------------------------------------------------------
  test:
    name: Quality Gate
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: development

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Sync dependencies (locked)
        run: uv sync --locked --dev

      - name: Type check (basedpyright)
        run: uv run python -m basedpyright src

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Tests (pytest)
        run: PYTHONPATH="${PWD}" uv run python -m pytest -q -p no:cacheprovider

  # --------------------------------------------------------------------------
  # Job 2 — Compile standalone binary with PyInstaller
  # --------------------------------------------------------------------------
  build:
    name: Build Binary
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v6
        with:
          ref: development

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Sync dependencies (locked, with dev extras for PyInstaller)
        run: uv sync --locked --dev

      - name: Build standalone binary
        run: uv run pyinstaller build.spec

      - name: Smoke-test binary
        run: |
          ./dist/dots-tui --help
          # Ensure the binary is an ELF executable (not empty / corrupt)
          file ./dist/dots-tui | grep -q "ELF"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: dots-tui-linux-x86_64
          path: dist/dots-tui
          if-no-files-found: error
          retention-days: 7
